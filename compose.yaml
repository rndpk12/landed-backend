services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-landed}
      POSTGRES_USER: ${POSTGRES_USER:-landed}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-landed-local-password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-landed}
      DB_USERNAME: ${POSTGRES_USER:-landed}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-landed-local-password}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      RESUME_STORAGE_PATH: /app/data/resumes
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - resume_data:/app/data/resumes

volumes:
  postgres_data:
  resume_data:
