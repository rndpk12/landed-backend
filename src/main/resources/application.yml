spring:
  application:
    name: landed-api
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/landed}
    username: ${DB_USERNAME:landed}
    password: ${DB_PASSWORD:landed-local-password}
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:10}
      minimum-idle: 2
      connection-timeout: 30000
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc.time_zone: UTC
  flyway:
    enabled: true
  jackson:
    default-property-inclusion: non_null
  mvc:
    problemdetails:
      enabled: true
  servlet:
    multipart:
      max-file-size: ${MAX_RESUME_FILE_SIZE:10MB}
      max-request-size: ${MAX_RESUME_FILE_SIZE:10MB}

server:
  port: ${PORT:8080}
  shutdown: graceful
  error:
    include-message: never

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: ${JWT_EXPIRATION:86400000}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  storage:
    resume-directory: ${RESUME_STORAGE_PATH:./data/resumes}
  job-import:
    allowed-hosts: ${JOB_IMPORT_ALLOWED_HOSTS:linkedin.com,naukri.com,greenhouse.io,boards.greenhouse.io,job-boards.greenhouse.io}
    connect-timeout-seconds: 5
    request-timeout-seconds: 10

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    org.springframework.security: INFO
