spring:
  datasource:
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:5}
      minimum-idle: ${DB_MIN_IDLE:1}
  jpa:
    show-sql: false

server:
  forward-headers-strategy: framework
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never

management:
  endpoint:
    health:
      show-details: never

logging:
  level:
    root: INFO
    org.springframework.security: WARN
